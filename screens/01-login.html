<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Screen 01 — Login Page | FleetOps</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 32px; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; position: relative; }
  .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
  .logo-icon { width: 48px; height: 48px; background: #f97316; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 0 24px rgba(249,115,22,.35); }
  .logo-text h1 { font-size: 22px; font-weight: 700; color: #fff; }
  .logo-text p { font-size: 12px; color: #64748b; margin-top: 2px; }
  .section-title { font-size: 18px; font-weight: 600; color: #f1f5f9; margin-bottom: 6px; }
  .section-sub { font-size: 13px; color: #64748b; margin-bottom: 28px; }
  .google-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: #fff; color: #1e293b; border: none; border-radius: 12px; padding: 13px 20px; width: 100%; font-size: 14px; font-weight: 600; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
  .google-icon { width: 20px; height: 20px; }
  .divider { border: none; border-top: 1px solid #334155; margin: 24px 0; }
  .roles { display: flex; gap: 8px; flex-wrap: wrap; }
  .role-pill { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .role-admin { background: rgba(168,85,247,.15); color: #c084fc; }
  .role-dispatcher { background: rgba(59,130,246,.15); color: #93c5fd; }
  .role-driver { background: rgba(249,115,22,.15); color: #fb923c; }
  .footer { font-size: 11px; color: #475569; margin-top: 24px; }
  .screen-tag { position: absolute; top: -12px; left: 20px; background: #f97316; color: #fff; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: .05em; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<p class="label">FleetOps · UI Screen 01 of 09</p>
<div class="card">
  <div class="screen-tag">LOGIN</div>
  <div class="logo">
    <div class="logo-icon">🚚</div>
    <div class="logo-text">
      <h1>FleetOps</h1>
      <p>Real-Time Order & Driver Management</p>
    </div>
  </div>
  <p class="section-title">Welcome back</p>
  <p class="section-sub">Sign in to manage your fleet operations</p>
  <button class="google-btn">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>
  <hr class="divider" />
  <p style="font-size:11px;color:#475569;margin-bottom:8px;">Role-based access control:</p>
  <div class="roles">
    <span class="role-pill role-admin">Admin</span>
    <span class="role-pill role-dispatcher">Dispatcher</span>
    <span class="role-pill role-driver">Driver</span>
  </div>
</div>
<p class="footer">Pravaah Consulting · T2 Assessment · FleetOps v1.0</p>
</body>
</html>
